<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>❌⭕ XO – Lover’s Edition</title>

  <script src="https://kit.fontawesome.com/f26a888174.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="intro">
  <div class="intro-logo">
    <span>❌</span>
    <span>⭕</span>
    <span>&nbsp</span>
    <span></span>
    <span>G</span>
    <span>A</span>
    <span>M</span>
    <span>E</span>
  </div>
</div>
<h1>❌⭕</h1>
<!-- CONTROL DOCK -->
<div class="control-dock">
  <button onclick="location.href='../../index.html'">
    <i class="fa-solid fa-arrow-left"></i>
  </button>

  <button id="switchPlayer">
    <i class="fa-solid fa-mars"></i>
  </button>

  <button id="resetScore" title="Reset scor">
    <i class="fa-solid fa-broom"></i>
  </button>
</div>



<!-- SCORE -->
<div id="scoreBoard">

  <div class="score-item he">
    <img id="avatarHe" class="avatar">
    <div id="reactionHe" class="avatar-reaction"></div>
    <span class="label">
      <i class="fa-solid fa-mars"></i>
    </span>
    <span id="scoreHe">0</span>
  </div>

  <div class="score-item she">
    <img id="avatarShe" class="avatar">
    <div id="reactionShe" class="avatar-reaction"></div>
    <span class="label">
      <i class="fa-solid fa-venus"></i>
    </span>
    <span id="scoreShe">0</span>
  </div>

</div>

<!-- BOARD -->
<div id="board" class="board"></div>

<div id="status" class="status">Rândul LUI</div>

<button id="restartBtn" class="restart hidden">🔁 Joc nou</button>

<!-- GIFT BOX (ASCUNS INIT) -->
<div id="giftBox" class="gift-box hidden">🎁</div>

<!-- GIFT RESULT OVERLAY FULLSCREEN -->
<div id="giftOverlay" class="gift-overlay hidden">
  <div class="gift-result-box">
    <div class="gift-emoji">🎁</div>
    <h2 id="giftTitle"></h2>
    <p id="giftText"></p>
    <button id="closeGiftOverlay">OK</button>
  </div>
</div>

<script src="../../globalstats.js"></script>
<script src="app.js"></script>



</body>
</html>
